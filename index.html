<!DOCTYPE html>
<html lang="ru">
<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Читалка</title>
    <link rel="icon" type="image/x-icon" href="favicon.ico?v=2">
    <link rel="stylesheet" href="styles.css">

</head>
<body>

    <button class="menu-toggle" onclick="toggleMenu()">☰</button>

    <div class="overlay" id="overlay" onclick="toggleMenu()"></div>

    <div class="sidebar" id="sidebar">
        <h2>Оглавление</h2>
        <ul id="toc"></ul>
    </div>

    <div class="container">
        <h1 id="page-title">Читалка</h1>
        <div id="content" class="content">Загрузка...</div>
        <div class="controls">
            <button onclick="prevChapter()">◀ Предыдущая</button>
            <button onclick="nextChapter()">Следующая ▶</button>
        </div>
    </div>

    <div id="floating-menu">
        <button id="arrow-toggle">></button>
        <div id="arrow-content">
            <button id="theme-toggle">🌙</button>
            <button id="increase-font">➕</button>
            <button id="decrease-font">➖</button>
        </div>
    </div>

    <script>
        let chapter = 1;
        let volume = 1;
        //const totalChapters = 213; // СКОЛЬКО ГЛАВ ВСЕГО

        const volumes = {
            1: 27,
            2: 23,
            3: 32,
            4: 28,
            5: 28,
            6: 25,
            7: 25,
            8: 24,
            9: 22,
            10: 24,
            11: 24,
            12: 23,
            13: 26,
            14: 23,
            15: 24,
            16: 20,
            17: 23,
            18: 23,
            19: 22,
            20: 24,
            21: 24,
            22: 24
        };

        /*function loadChapter(chapterNumber) {
            fetch(`chapters/chapter${chapterNumber}.txt`)
                .then(response => {
                    if (!response.ok) throw new Error('Глава не найдена');
                    return response.text();
                })
                .then(text => {
                    document.getElementById('content').innerText = text;
                    document.getElementById('page-title').textContent = `Глава ${chapterNumber}`;
                    window.scrollTo(0, 0);
                    updateTOC(chapterNumber); // Обновлят индикатор в оглавлении
                })
                .catch(error => {
                    document.getElementById('content').innerText = 'Глава не найдена';
                });
        }*/

        function loadChapter(vol, ch) {
            // Обновляем глобальные переменные
            volume = vol;
            chapter = ch;
            
            fetch(`volumes/volume${vol}/chapter${ch}.txt`)
                .then(response => {
                    if (!response.ok) throw new Error('Глава не найдена');
                    return response.text();
                })
                .then(text => {
                    document.getElementById('content').innerText = text;
                    document.getElementById('page-title').textContent = `Том ${vol} — Глава ${ch}`;
                    window.scrollTo(0, 0);
                    updateTOC(vol, ch);
                })
                .catch(error => {
                    document.getElementById('content').innerText = 'Глава не найдена';
                });
        }

        /*function prevChapter() {
            if (chapter > 1) {
                chapter--;
                loadChapter(chapter);
            }
        }

        function nextChapter() {
            if (chapter < totalChapters) {
                chapter++;
                loadChapter(chapter);
            }
        }*/

        function prevChapter() {
            if (chapter > 1) {
                chapter--;
            } else if (volume > 1) {
                volume--;
                chapter = volumes[volume]; // последняя глава предыдущего тома
            }
            loadChapter(volume, chapter);
        }

        function nextChapter() {
            if (chapter < volumes[volume]) {
                chapter++;
            } else if (volume < Object.keys(volumes).length) {
                volume++;
                chapter = 1; // первая глава следующего тома
            }
            loadChapter(volume, chapter);
        }

        function toggleMenu() {
            document.getElementById('sidebar').classList.toggle('open');
            document.getElementById('overlay').classList.toggle('open');
        }

        /*function generateTOC() {
            const toc = document.getElementById('toc');
            for (let i = 1; i <= totalChapters; i++) {
                const li = document.createElement('li');
                li.textContent = `Глава ${i}`;
                li.setAttribute("data-chapter", i);
                li.onclick = () => {
                    chapter = i;
                    loadChapter(i);
                    toggleMenu();
                };
                toc.appendChild(li);
            }
            updateTOC(chapter);
        }*/

        function generateTOC() {
            const toc = document.getElementById('toc');
            toc.innerHTML = "";
            for (let v = 1; v <= Object.keys(volumes).length; v++) {
                const volLi = document.createElement('li');
                volLi.textContent = `Том ${v}`;
                //const ul = document.createElement('ul');
                volLi.classList.add("volume"); // класс тома
                
                const ul = document.createElement('ul');
                ul.classList.add("chapters"); // список глав
                //ul.style.display = "none"; // скрыто по умолчанию
                ul.style.maxHeight = "0"; // изначально закрыто
                
                for (let c = 1; c <= volumes[v]; c++) {
                    const li = document.createElement('li');
                    li.textContent = `   • Глава ${c}`;
                    li.setAttribute("data-volume", v);
                    li.setAttribute("data-chapter", c);
                    li.onclick = () => {
                        volume = v;
                        chapter = c;
                        loadChapter(v, c);
                        toggleMenu();
                    };
                    ul.appendChild(li);
                }

                // обработка клика на том
                /*volLi.onclick = () => {
                    const isOpen = ul.style.display === "block";
                    document.querySelectorAll(".chapters").forEach(list => list.style.display = "none");
                    if (!isOpen) {
                        ul.style.display = "block";
                    }
                };*/

                volLi.onclick = (e) => {
                    e.stopPropagation(); // Предотвращаем всплытие события
                    // Закрываем все другие списки глав
                    document.querySelectorAll(".chapters").forEach(list => {
                        if (list !== ul) {
                            list.classList.remove("open");
                            list.style.maxHeight = "0";
                        }
                    });
                    // Переключаем текущий список
                    if (ul.classList.contains("open")) {
                        ul.classList.remove("open");
                        ul.style.maxHeight = "0";
                    } else {
                        ul.classList.add("open");
                        ul.style.maxHeight = ul.scrollHeight + "px";
                    }
                    /*ul.classList.toggle("open");*/
                };

                volLi.appendChild(ul);
                toc.appendChild(volLi);
            }
            updateTOC(volume, chapter);
        }

        /*function updateTOC(currentChapter) {
            document.querySelectorAll("#toc li").forEach(li => {
                li.classList.remove("active");
                if (parseInt(li.getAttribute("data-chapter")) === currentChapter) {
                    li.classList.add("active");
                }
            });
        }*/

        function updateTOC(currentVol, currentChapter) {
            /*document.querySelectorAll(".chapters").forEach(list => {
                list.classList.remove("open");
                list.style.maxHeight = "0px";
            });*/
            
            document.querySelectorAll("#toc li ul li").forEach(li => {
                li.classList.remove("active");
                if (
                    parseInt(li.getAttribute("data-volume")) === currentVol &&
                    parseInt(li.getAttribute("data-chapter")) === currentChapter
                ) {
                    li.classList.add("active");
                    // Автоматически раскрываем том с активной главой
                    const chaptersList = li.closest('.chapters');
                    if (chaptersList) {
                        chaptersList.classList.add("open");
                        // Вычисляем динамическую высоту
                        /*const chaptersCount = volumes[currentVol];
                        const chapterHeight = 41;
                        const dynamicHeight = chaptersCount * chapterHeight + 20;
                        chaptersList.style.maxHeight = dynamicHeight + "px";*/
                        chaptersList.style.maxHeight = chaptersList.scrollHeight + "px";
                    }
                }
            });
        }

        generateTOC();
        //loadChapter(chapter);
        loadChapter(volume, chapter);

        document.addEventListener("DOMContentLoaded", () => {
            const themeToggle = document.getElementById("theme-toggle");
            const currentTheme = localStorage.getItem("theme");

            const increaseFont = document.getElementById("increase-font");
            const decreaseFont = document.getElementById("decrease-font");

            const content = document.querySelector(".content");

            const arrowToggle = document.getElementById("arrow-toggle");
            const floatingMenu = document.getElementById("floating-menu");

            arrowToggle.addEventListener("click", () => {
                floatingMenu.classList.toggle("open");
            });

            if (currentTheme === "dark") {
                themeToggle.textContent = "☀️";
            } else {
                themeToggle.textContent = "🌙";
            }

            if (currentTheme) {
                document.documentElement.setAttribute("data-theme", currentTheme);
            } else {
                document.documentElement.setAttribute("data-theme", "light");
            }

            themeToggle.addEventListener("click", () => {
                const theme = document.documentElement.getAttribute("data-theme");
                if (theme === "dark") {
                    document.documentElement.setAttribute("data-theme", "light");
                    themeToggle.textContent = "🌙";
                    localStorage.setItem("theme", "light");
                } else {
                    document.documentElement.setAttribute("data-theme", "dark");
                    themeToggle.textContent = "☀️";
                    localStorage.setItem("theme", "dark");
                }
                console.log("New theme: ", localStorage.getItem("theme")); //
            });

            // Изменение размера шрифта

            let fontSize = parseInt(localStorage.getItem("fontSize")) || 22;
            content.style.fontSize = fontSize + "px";

            increaseFont.addEventListener("click", () => {
                if (fontSize < 36) {
                    fontSize += 2;
                    content.style.fontSize = fontSize + "px";
                    localStorage.setItem("fontSize", fontSize);
                }
            });

            decreaseFont.addEventListener("click", () => {
                if (fontSize > 18) {
                    fontSize -= 2;
                    content.style.fontSize = fontSize + "px";
                    localStorage.setItem("fontSize", fontSize);
                }
            });
        });
    </script>

</body>
</html>
